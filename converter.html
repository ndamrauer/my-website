<!DOCTYPE html>
<html>
  <head>
    <title>Energy Unit Converter</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 60px auto;
        color: #333;
      }

      h1 {
        color: #2c7be5;
      }

      label {
        display: block;
        margin-top: 20px;
        font-weight: bold;
      }

      input, select {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        font-size: 16px;
        box-sizing: border-box;
      }

      button {
        margin-top: 24px;
        padding: 10px 24px;
        background-color: #2c7be5;
        color: white;
        border: none;
        font-size: 16px;
        cursor: pointer;
        border-radius: 4px;
      }

      button:hover {
        background-color: #1a5fb4;
      }

      #result {
        margin-top: 24px;
        font-size: 18px;
        background-color: #f0f4ff;
        padding: 16px;
        border-radius: 4px;
        display: none;
      }

      #warning {
        margin-top: 12px;
        font-size: 14px;
        color: #888;
        font-style: italic;
      }

      nav {
        margin-bottom: 40px;
      }

      nav a {
        margin-right: 20px;
        color: #2c7be5;
        text-decoration: none;
        font-weight: bold;
      }

      nav a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="members.html">Members</a>
      <a href="converter.html">Energy Converter</a>
    </nav>

    <h1>Energy Unit Converter</h1>

    <label>Enter a value:</label>
    <input type="number" id="inputValue" placeholder="e.g. 1.5">

    <label>Convert from:</label>
    <select id="fromUnit">
      <option value="J">Joules (J)</option>
      <option value="eV">Electron Volts (eV)</option>
      <option value="kJmol">Kilojoules per mole (kJ/mol)</option>
      <option value="kcalmol">Kilocalories per mole (kcal/mol)</option>
      <option value="hartree">Hartree (Eh)</option>
      <option value="wavenumber">Wavenumbers (cm⁻¹)</option>
      <option value="Hz">Hertz (Hz)</option>
      <option value="MHz">Megahertz (MHz)</option>
      <option value="GHz">Gigahertz (GHz)</option>
      <option value="nm">Nanometers (nm)</option>
      <option value="K">Kelvin (K)</option>
    </select>

    <label>Convert to:</label>
    <select id="toUnit">
      <option value="J">Joules (J)</option>
      <option value="eV">Electron Volts (eV)</option>
      <option value="kJmol">Kilojoules per mole (kJ/mol)</option>
      <option value="kcalmol">Kilocalories per mole (kcal/mol)</option>
      <option value="hartree">Hartree (Eh)</option>
      <option value="wavenumber">Wavenumbers (cm⁻¹)</option>
      <option value="Hz">Hertz (Hz)</option>
      <option value="MHz">Megahertz (MHz)</option>
      <option value="GHz">Gigahertz (GHz)</option>
      <option value="nm">Nanometers (nm)</option>
      <option value="K">Kelvin (K)</option>
    </select>

    <button onclick="convert()">Convert</button>

    <div id="result"></div>
    <div id="warning"></div>

    <script>
      // Fundamental constants
      const AVOGADRO    = 6.02214076e23;
      const H_PLANCK    = 6.62607015e-34;  // J·s
      const C_LIGHT     = 2.99792458e10;   // cm/s (for wavenumbers)
      const C_LIGHT_M   = 2.99792458e8;    // m/s (for nm)
      const K_BOLTZMANN = 1.380649e-23;    // J/K

      const toJoules = {
        J:          1,
        eV:         1.602176634e-19,
        kJmol:      1000 / AVOGADRO,
        kcalmol:    4184 / AVOGADRO,
        hartree:    4.3597447222071e-18,
        wavenumber: H_PLANCK * C_LIGHT,
        Hz:         H_PLANCK,
        MHz:        H_PLANCK * 1e6,
        GHz:        H_PLANCK * 1e9,
        nm:         null, // handled specially
        K:          K_BOLTZMANN
      };

      const unitLabels = {
        J:          "Joules (J)",
        eV:         "eV",
        kJmol:      "kJ/mol",
        kcalmol:    "kcal/mol",
        hartree:    "Hartree (Eh)",
        wavenumber: "cm⁻¹",
        Hz:         "Hz",
        MHz:        "MHz",
        GHz:        "GHz",
        nm:         "nm",
        K:          "K"
      };

      function toJoulesValue(value, unit) {
        if (unit === "nm") {
          return (H_PLANCK * C_LIGHT_M) / (value * 1e-9);
        }
        return value * toJoules[unit];
      }

      function convert() {
        let value     = parseFloat(document.getElementById("inputValue").value);
        let fromUnit  = document.getElementById("fromUnit").value;
        let toUnit    = document.getElementById("toUnit").value;
        let warningEl = document.getElementById("warning");
        let resultEl  = document.getElementById("result");

        warningEl.innerText = "";

        if (isNaN(value)) {
          resultEl.style.display = "block";
          resultEl.innerText = "Please enter a valid number.";
          return;
        }

        if (value <= 0 && (fromUnit === "nm" || toUnit === "nm")) {
          resultEl.style.display = "block";
          resultEl.innerText = "Please enter a positive value for wavelength conversions.";
          return;
        }

        let valueInJoules = toJoulesValue(value, fromUnit);
        let result;

        if (toUnit === "nm") {
          result = (H_PLANCK * C_LIGHT_M) / valueInJoules / 1e-9;
        } else {
          result = valueInJoules / toJoules[toUnit];
        }

        let formatted;
        if (result === 0) {
          formatted = "0";
        } else if (Math.abs(result) < 0.001 || Math.abs(result) > 1e6) {
          formatted = result.toExponential(6);
        } else {
          formatted = parseFloat(result.toPrecision(6)).toString();
        }

        resultEl.style.display = "block";
        resultEl.innerHTML =
          `<strong>${value} ${unitLabels[fromUnit]}</strong> = <strong>${formatted} ${unitLabels[toUnit]}</strong>`;

        if (fromUnit === "K" || toUnit === "K") {
          warningEl.innerText = "Note: Kelvin conversion uses E = k\u2082T (thermal energy).";
        }
        if (fromUnit === "nm" || toUnit === "nm") {
          warningEl.innerText = "Note: nm conversion uses E = hc/\u03bb (photon energy).";
        }
      }
    </script>
  </body>
</html>
